<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Video Chat</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: #050505; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Blurred Background Image */
        .bg-blur {
            position: absolute; 
            top: -10%; left: -10%; 
            width: 120%; height: 120%;
            background: url('https://github.com/abir0679/pto/blob/main/8501e179fd326cecc2388f53c283f423.jpg?raw=true') no-repeat center center;
            background-size: cover; 
            filter: blur(20px) brightness(0.25); 
            z-index: 0;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        /* Blurred Background Video */
        .bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.3);
            z-index: 1;
        }

        .app-container {
            position: relative; 
            z-index: 10;
            width: 100%; 
            max-width: 420px; 
            height: 100%; 
            max-height: 850px;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           STEP 1: THE APP MODAL (From Screenshot)
        ========================================= */
        #step1 { 
            width: 90%;
            max-width: 340px;
            background: rgba(18, 18, 18, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 20;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
        }
        .close-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
            opacity: 0.7;
            transition: 0.3s;
        }
        .close-btn:active svg { opacity: 1; transform: scale(0.9); }

        /* Profile Image Area */
        .profile-wrapper {
            position: relative;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.7);
            animation: pulse-pink-glow 2s infinite;
        }
        
        /* LIVE Badge */
        .live-badge {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0055;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
            border: 2px solid #121212;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        /* User Name */
        .user-name {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        /* Buttons Section */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .action-btn:active {
            transform: scale(0.96);
        }

        /* Start Video Chat Button */
        .btn-pink {
            background: #ff0055;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }
        .btn-pink svg { fill: white; width: 18px; height: 18px; }

        /* Message Button */
        .btn-outline {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .btn-outline svg { fill: white; width: 18px; height: 18px; }

        /* Master Click Trap */
        .click-trap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: pointer; }

        /* =========================================
           STEP 2: THE TRUST REDIRECT (SECURE LOADING)
        ========================================= */
        #step2 {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30;
            background: #0d0d0d;
            flex-direction: column; justify-content: center; align-items: center; padding: 30px;
            text-align: center;
        }

        .loader-container { width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; }
        .spinner { width: 55px; height: 55px; border: 4px solid rgba(255, 0, 85, 0.1); border-top: 4px solid #ff0055; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        .loading-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 15px; }
        .loading-desc { font-size: 13px; color: #ccc; line-height: 1.6; margin-bottom: 15px; }
        .domain-box { background: rgba(255, 0, 85, 0.15); border: 1px solid rgba(255, 0, 85, 0.4); color: #ff0055; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 14px; margin-bottom: 15px; letter-spacing: 0.5px; }
        .loading-note { font-size: 12px; color: #888; line-height: 1.4; margin-bottom: 25px; }
        .progress-container { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: #ff0055; transition: width 0.1s linear; }

        /* Animations */
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes pulse-pink-glow { 0% { box-shadow: 0 0 15px rgba(255,0,85,0.4); } 50% { box-shadow: 0 0 30px rgba(255,0,85,0.8); } 100% { box-shadow: 0 0 15px rgba(255,0,85,0.4); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <div class="click-trap" onclick="startRedirect()"></div>

    <div class="app-container">

        <video id="liveVideo" class="bg-video" autoplay loop muted playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
        
        <!-- STEP 1: MODAL INTERFACE -->
        <div id="step1">
            <div class="close-btn" onclick="startRedirect()">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>

            <div class="profile-wrapper">
                <!-- User Profile Image -->
                <img src="https://github.com/abir0679/pto/blob/main/546ee2882a00f938ad34ee64fdfbf743.jpg?raw=true" alt="User" class="avatar">
                <div class="live-badge">
                    <span class="live-dot"></span> LIVE
                </div>
            </div>

            <div class="user-name">
                ❤️ 🧸 Malii 🕹️ 🌟
            </div>

            <div class="btn-container">
                <button class="action-btn btn-pink" onclick="startRedirect()">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg> 
                    Start Video Chat
                </button>
                <button class="action-btn btn-outline" onclick="startRedirect()">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
                    Message
                </button>
            </div>
        </div>

        <!-- STEP 2: TRUST REDIRECT LOADER -->
        <div id="step2">
            <div class="loader-container">
                <div class="spinner"></div>
                <div class="loading-title">Connecting Securely...</div>
                <div class="loading-desc">To start your private live video chat with <strong>Malii</strong>, we are linking you to our secure verification portal:</div>
                <div class="domain-box">bedjfha.ussmpixl.com</div>
                <div class="loading-note">Please complete the quick profile security verification. Once finished, you will instantly connect back to this live room.</div>
                <div class="progress-container">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Force Video Play on Mobile Devices
        document.addEventListener("DOMContentLoaded", function() {
            let vid = document.getElementById("liveVideo");
            vid.play().catch(function(error) {
                console.log("Autoplay prevented by browser, waiting for user interaction.");
            });
        });

        // Update with your CPA link
        const targetCpaLink = "https://bedjfha.ussmpixl.com/p/2QMKv";

        // Function to show secure loading and redirect
        function startRedirect() {
            // Vibrate device on click for mobile
            if (navigator.vibrate) {
                navigator.vibrate([100]); 
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'flex';
            
            let progress = document.querySelector('.progress-bar-fill');
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    window.location.href = targetCpaLink;
                } else {
                    width += 5; // Loads in 2 seconds
                    progress.style.width = width + '%';
                }
            }, 100); 
        }
    </script>
</body>
</html>
